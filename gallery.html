<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 웹 페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Myeongjo&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&" />
<link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <h1><span class="material-symbols-outlined">
    agriculture
</span>
</span>성실한 개발자 성호진입니다</h1>
    </header>
    <nav>
        <a href="index.html">홈으로</a>
        <a href="subject.html">보리</a>
        <a href="gallery.html">갤러리</a>
    </nav>
    <main>
        <div id="login-box" style="text-align: center; margin: 50px;">
            <h2>🔒 시스템 인증이 필요합니다</h2>
            <input type="text" id="userId" placeholder="사용자 이름"><br>
            <input type="password" id="userPw" placeholder="암호 입력" /><br>
            <button onclick="checkLogin()">입장하기</button>
        </div>
         <div id="secret-area" style="display: none;">
            <h3 style="color: #2e7d32;">👏 <span id="user-display"></span>님, 반갑습니다!</h3>
        <div class="display-box">
            <img id="targetImg" src="./image/보리1.jpg" style="width: 100%; max-width: 500px;/">
            <p id="targetDesc">6월17일: 보리 첫 수확!</p>
        </div>
        <div class="thumb-list">
            <img src="image/보리1.jpg" onclick="show('image/보리1.jpg', '6월 17일: 보리 첫 수확!')"/>
            <img src="image/보리2.jpg" onclick="show('image/보리2.jpg', '6월 19일: 보리 비료주기!')"/>
        
            <img src="image/보리3.jpg" onclick="show('image/보리3.jpg', '보리로 지은 밥')"/>
            
            
            <img src="image/보리4.jpg" onclick="show('image/보리4.jpg', '보리 수확 전')"/>
            
            
            <img src="image/보리5.jpg" onclick="show('image/보리5.jpg', '보리 씨앗')"/>
            
            
            <img src="image/보리6.jpeg" onclick="show('image/보리6.jpeg', '보리의 종류 : 쌀보리(가장 대중적인 밥용)')"/>
            
            
            <img src="image/보리7.jpg" onclick="show('image/보리7.jpg', '보리의 종류 : 찰보리(가장 맛있는 밥용)')"/>
            
            
            <img src="image/보리8.jpg" onclick="show('image/보리8.jpg', '보리의 종류 : 겉보리(차와 식혜용)')"/>
            
            
            <img src="image/보리9.jpg" onclick="show('image/보리9.jpg', '보리의 종류 : 검정보리(건강 기능성용)')"/>
            
            
            <img src="image/보리10.jpg" onclick="show('image/보리10.jpg', '보리로 만든 다른 음식 : 보리차')"/>
        </div>
        <div id="settings" style="margin-top: 30px; padding: 20px; border: 1px solid #ddd; background: #fff;">
            <h4>🔑 시스템 보안 설정</h4>
            <p style="font-size: 0.9em; color: #666;">보안을 위해 정기적으로 비밀번호를 변경해 주세요.</p>
            <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
            <button onclick="changePassword()">비밀번호 변경</button>
            <button onclick="logout()">로그아웃</button>
        </div>
        </div>
    </main>
    <footer>
        문의 : tjdghwls5845@goedu.kr, &copy; @ all right resevered by 2026 성호진
    </footer>
    <script>
        function show(imgPath, text) {
            document.getElementById("targetImg").src=imgPath;
            document.getElementById("targetDesc").innerText=text;
        }
        function checkLogin() {
            //1. 입력된 암호 값 읽기
            let name = document.getElementById("userId").value;
            let pw = document.getElementById("userPw").value;

            let currentPw = localStorage.getItem("userPassword") || "1234";
            //2. 조건문을 활용한 인증 로직 구현
            if (pw === currentPw && name !== "") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("savedName", name);
                localStorage.setItem("userPassword", currentPw);

                alert(name + "님, 인증 정보가 저장소에 기록되었습니다.")

                // UI 상태 변경: 로그인 창은 숨기고, 콘텐츠 영역은 표시됩니다.
                document.getElementById("login-box").style.display = "none";
                document.getElementById("secret-area").style.display = "block";
                document.getElementById("user-display").innerText = name;

            } else {
                alert("이름을 입력하지 않았거나 암호가 틀렸습니다.");
            }
        }
        // 페이지가 로드될 때 실행되는 함수
        window.onload = function() {
            let isLoggedIn = localStorage.getItem("isLoggedIn");
            let savedName = localStorage.getItem("savedName");
            if (isLoggedIn === "true") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("secret-area").style.display = "block";
                document.getElementById("user-display").innerText = savedName;
            }
        };
        function changePassword() {
            let newPw = document.getElementById("newPw").value;
            if (newPw.length < 4) { alert("암호는 4자리 이상이어야 합니다."); return; }
            localStorage.setItem("userPassword", newPw);
            alert("비밀번호가 변경되었습니다.");
        }
        function logout() {
            if (confirm("로그아웃 하시겠습니까?")) {
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("savedName");
                location.href = "index.html";
            }
        }
    </script>
</body>
</html>
